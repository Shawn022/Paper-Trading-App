  <path d="M3 24 Q16 18 30 4" fill="none" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
  <path d="M26 2 L31 5 L28 10" fill="none" stroke="#facc15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
