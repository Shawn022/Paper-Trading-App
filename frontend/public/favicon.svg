  <rect x="2" y="10" width="6" height="11" rx="1" fill="#ef4444"/>

  <!-- Candle 2 — red -->
  <line x1="13" y1="6" x2="13" y2="25" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="10" y="10" width="6" height="10" rx="1" fill="#ef4444"/>

  <!-- Candle 3 — green -->
  <line x1="21" y1="5" x2="21" y2="24" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="18" y="7" width="6" height="12" rx="1" fill="#22c55e"/>

  <!-- Candle 4 — green -->
