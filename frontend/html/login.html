<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Paper Trading</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="flex items-center justify-center">

    <div class="card fade-in" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <div class="text-center mb-4">
            <h2 class="text-2xl text-primary font-bold">Welcome Back</h2>
            <p class="text-muted mt-2">Sign in to continue paper trading</p>
        </div>

        <div id="alert-box" class="alert alert-error"></div>

        <form id="login-form">
            <div class="form-group">
                <input type="email" id="email" class="form-input" placeholder="Email" required>
                <label for="email" class="form-label">Email Address</label>
            </div>
            <div class="form-group">
                <input type="password" id="password" class="form-input" placeholder="Password" required>
                <label for="password" class="form-label">Password</label>
            </div>
            
            <button type="submit" id="submit-btn" class="btn btn-primary w-full mt-4 text-xl">
                Sign In
            </button>
        </form>

        <div class="text-center mt-8 text-muted">
            Don't have an account? <a href="signup.html" class="text-primary font-bold">Sign Up</a>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="../api.js"></script>
    <script src="../auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');
            const alertBox = document.getElementById('alert-box');
            
            btn.textContent = 'Signing In...';
            btn.disabled = true;
            alertBox.style.display = 'none';

            try {
                const user = await window.api.login(email, password);
                localStorage.setItem('paper_user', JSON.stringify(user));
                window.location.href = 'index.html';
            } catch (err) {
                alertBox.textContent = err.message;
                alertBox.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
