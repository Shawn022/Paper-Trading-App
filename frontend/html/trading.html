<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading - Paper Trading</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar fade-in">
            <div class="sidebar-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--primary)"><path d="M3 3v18h18V3H3zm16 16H5V5h14v14zm-4-4h-2v-4h-2v4H9v-6h2V9h2v4h2v4z"/></svg>
                PaperTrade
            </div>
            <nav class="nav-links mt-4">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="graph.html" class="nav-link">Graphs</a>
                <a href="trading.html" class="nav-link active">Trading</a>
                <a href="history.html" class="nav-link">History</a>
                <a href="learn.html" class="nav-link">Learn</a>
                <a href="analytics.html" class="nav-link">Analytics</a>
                <a href="profile.html" class="nav-link">Profile</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="user-badge" id="nav-profile-logo" title="Go to Profile">
                    <span class="user-name-display font-bold">User</span>
                    <div class="avatar user-avatar-display">U</div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area fade-in">
                <div class="flex items-center justify-between mb-8">
                    <h1 class="text-2xl">Select Stock to Buy</h1>
                    <div class="search-container form-group" style="margin-bottom: 0;">
                        <input type="text" id="stock-search" class="form-input" placeholder="Search a stock..." autocomplete="off">
                        <label for="stock-search" class="form-label">Search a stock...</label>
                    </div>
                </div>

                <div id="stock-tiles-large-container" class="stock-tiles-grid">
                    <!-- Large Tiles rendered by JS -->
                </div>
            </div>
            
            <!-- Buy Modal Popup -->
            <div id="buy-modal" class="modal-backdrop">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="text-xl">Buy <span id="modal-symbol"></span></h2>
                        <div class="modal-close" id="close-buy-modal">&times;</div>
                    </div>
                    
                    <div id="alert-box" class="alert mt-2" style="display: none;"></div>

                    <div class="text-center mb-6">
                        <div class="text-muted text-sm font-bold uppercase mb-2">Live Price</div>
                        <div class="text-3xl font-bold text-primary">
                            ₹<span id="live-price">--.--</span>
                        </div>
                    </div>

                    <div class="form-group mb-6">
                        <input type="number" id="quantity" class="form-input text-right" placeholder="0.0" min="0.01" step="0.01" value="1">
                        <label for="quantity" class="form-label">Quantity</label>
                    </div>

                    <div class="flex justify-between items-center mt-2 mb-6 text-sm">
                        <span class="text-muted">Available Balance:</span>
                        <span class="font-bold text-green">₹<span id="avail-balance">0.00</span></span>
                    </div>

                    <div class="flex justify-between items-center text-xl font-bold mb-6">
                        <span>Total Cost</span>
                        <span>₹<span id="total-cost">0.00</span></span>
                    </div>

                    <button id="execute-btn" class="btn btn-green btn-block text-xl py-3">Place Buy Order</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Core Scripts -->
    <script src="../api.js"></script>
    <script src="../auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const tilesContainer = document.getElementById('stock-tiles-large-container');
            const modal = document.getElementById('buy-modal');
            const closeBtn = document.getElementById('close-buy-modal');
            const modalSymbol = document.getElementById('modal-symbol');
            const livePriceEl = document.getElementById('live-price');
            const qtyInput = document.getElementById('quantity');
            const totalCostEl = document.getElementById('total-cost');
            const availBalanceEl = document.getElementById('avail-balance');
            const executeBtn = document.getElementById('execute-btn');
            const alertBox = document.getElementById('alert-box');

            let currentPrice = 0;
            let activeSymbol = null;
            let pricePollInterval = null;

            // Load Balance
            if (currentUser) {
                try {
                    const port = await window.api.getPortfolio(currentUser.id);
                    availBalanceEl.textContent = port.balance.toLocaleString(undefined, {minimumFractionDigits:2});
                } catch(e){}
            }

            function calcTotal() {
                const qty = parseFloat(qtyInput.value) || 0;
                totalCostEl.textContent = (qty * currentPrice).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
            }

            qtyInput.addEventListener('input', calcTotal);

            let cachedStocks = [];

            const searchInput = document.getElementById('stock-search');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    renderTiles(e.target.value.trim().toUpperCase());
                });
            }

            // Load Stocks to Large Tiles
            try {
                const stocks = await window.api.getAllStocks();
                if (stocks && stocks.length > 0) {
                    cachedStocks = stocks;
                } else {
                    throw new Error("Empty stocks returned");
                }
            } catch(e) { 
                console.error("Backend unavailable, using mock stocks:", e); 
                cachedStocks = [
                    { symbol: "AAPL.NS" }, { symbol: "TSLA.NS" },
                    { symbol: "TCS.NS" }, { symbol: "INFY.NS" },
                    { symbol: "RELIANCE.NS" }, { symbol: "HDFCBANK.NS" },
                    { symbol: "AMZN.NS" }, { symbol: "MSFT.NS" },
                    { symbol: "GOOGL.NS" }, { symbol: "META.NS" }
                ];
            } finally {
                renderTiles('');
            }

            async function renderTiles(searchTerm) {
                try {
                    tilesContainer.innerHTML = '';
                    
                    // Sort and filter stocks
                    let filtered = cachedStocks.filter(st => {
                        const sym = (st.symbol || '').replace('.NS', '');
                        return sym.includes(searchTerm);
                    });
                    
                    // Bring those starting with search term to top
                    if (searchTerm) {
                        filtered.sort((a, b) => {
                            const symA = (a.symbol || '').replace('.NS', '');
                            const symB = (b.symbol || '').replace('.NS', '');
                            const aStarts = symA.startsWith(searchTerm) ? -1 : 1;
                            const bStarts = symB.startsWith(searchTerm) ? -1 : 1;
                            if (aStarts !== bStarts) return aStarts - bStarts;
                            return symA.localeCompare(symB);
                        });
                    }
                    
                    let index = 0;
                    for (const st of filtered) {
                        const sym = (st.symbol || '').replace('.NS', '');
                        const tile = document.createElement('div');
                        
                        // Assign colorful classes in rotation
                        const colorClass = `tile-color-${index % 6}`;
                        tile.className = `stock-tile-large ${colorClass}`;
                        
                        if (searchTerm && sym.startsWith(searchTerm)) {
                            tile.classList.add('highlighted-tile');
                        }
                        
                        const initial = sym.charAt(0).toUpperCase();
                        tile.innerHTML = `
                            <div class="tile-logo">${initial}</div>
                            <div class="symbol">${sym}</div>
                            <div class="price" id="price-tile-${st.symbol}">₹--.--</div>
                        `;
                        
                        tile.addEventListener('click', (e) => {
                            const rect = tile.getBoundingClientRect();
                            openBuyModal(st.symbol, rect);
                        });
                        
                        tilesContainer.appendChild(tile);
                        index++;
                        
                        // Fetch price for tile asynchronously
                        if (window.api && window.api.getStockPrice) {
                            window.api.getStockPrice(st.symbol)
                                .then(price => {
                                    const priceEl = document.getElementById(`price-tile-${st.symbol}`);
                                    if(priceEl) priceEl.textContent = '₹' + price.toLocaleString(undefined, {minimumFractionDigits:2});
                                })
                                .catch(e => {
                                    // Fallback mock price if backend offline
                                    const priceEl = document.getElementById(`price-tile-${st.symbol}`);
                                    if(priceEl) {
                                        const mockPrice = Math.random() * 500 + 50;
                                        priceEl.textContent = '₹' + mockPrice.toLocaleString(undefined, {minimumFractionDigits:2});
                                    }
                                });
                        } else {
                            // API entirely missing
                            const priceEl = document.getElementById(`price-tile-${st.symbol}`);
                            if(priceEl) {
                                const mockPrice = Math.random() * 500 + 50;
                                priceEl.textContent = '₹' + mockPrice.toLocaleString(undefined, {minimumFractionDigits:2});
                            }
                        }
                    }
                } catch (err) {
                    console.error("Error in renderTiles:", err);
                }
            }

            function openBuyModal(symbol, sourceRect) {
                activeSymbol = symbol;
                modalSymbol.textContent = symbol;
                qtyInput.value = 1;
                livePriceEl.textContent = '--.--';
                totalCostEl.textContent = '0.00';
                currentPrice = 0;
                alertBox.style.display = 'none';
                
                if (sourceRect) {
                    const modalContent = modal.querySelector('.modal-content');
                    // Calculate relative transform origin based on screen position
                    // We want the modal to scale out from the center of the tile
                    const modalRect = modalContent.getBoundingClientRect();
                    const originX = typeof modalRect.width !== 'undefined' && modalRect.width > 0 ? (sourceRect.left + sourceRect.width/2) - (window.innerWidth / 2) + (modalRect.width / 2) : '50%';
                    const originY = typeof modalRect.height !== 'undefined' && modalRect.height > 0 ? (sourceRect.top + sourceRect.height/2) - (window.innerHeight / 2) + (modalRect.height / 2) : '50%';
                    
                    // We just set CSS custom properties or pass an animation start
                    modalContent.style.transformOrigin = `${sourceRect.left + sourceRect.width/2}px ${sourceRect.top + sourceRect.height/2}px`;
                    
                    // A simple and reliable way is to let the modal expand from the click source visually by adjusting transform-origin to match the screen point relative to the modal.
                    // Actually, setting transform-origin relative to the viewport is tricky when it's centered using flexbox.
                    // Let's rely on an absolute coordinate or fixed centering and custom animation.
                    // Instead, let's just use CSS class 'expandIn' in style.css which will handle scale.
                    modalContent.classList.add('expand-in-anim');
                }

                modal.classList.add('show');
                
                if (pricePollInterval) clearInterval(pricePollInterval);
                
                updateModalPrice(symbol);
                pricePollInterval = setInterval(() => updateModalPrice(symbol), 1500);
            }

            function closeBuyModal() {
                const modalContent = modal.querySelector('.modal-content');
                modalContent.classList.remove('expand-in-anim');
                modal.classList.remove('show');
                activeSymbol = null;
                if (pricePollInterval) clearInterval(pricePollInterval);
            }

            closeBtn.addEventListener('click', closeBuyModal);
            modal.addEventListener('click', (e) => {
                if(e.target === modal) closeBuyModal(); // Click outside
            });

            async function updateModalPrice(sym) {
                if (!sym) return;
                try {
                    const price = await window.api.getStockPrice(sym);
                    if (activeSymbol !== sym) return;
                    currentPrice = price;
                    livePriceEl.textContent = price.toLocaleString(undefined, {minimumFractionDigits:2});
                    
                    const tilePriceEl = document.getElementById(`price-tile-${sym}`);
                    if(tilePriceEl) tilePriceEl.textContent = '₹' + price.toLocaleString(undefined, {minimumFractionDigits:2});

                    calcTotal();
                } catch(e) {}
            }

            // Execute Buy Trade
            executeBtn.addEventListener('click', async () => {
                if (!activeSymbol) return;
                const qty = parseFloat(qtyInput.value);
                
                alertBox.style.display = 'none';
                executeBtn.disabled = true;

                try {
                    const res = await window.api.executeTrade(currentUser.id, activeSymbol, 'BUY', qty, currentPrice);
                    if (res.balance !== undefined) {
                        availBalanceEl.textContent = res.balance.toLocaleString(undefined, {minimumFractionDigits:2});
                    } else {
                        const totalCost = qty * currentPrice;
                        const currentBal = parseFloat(availBalanceEl.textContent.replace(/,/g, ''));
                        const newBal = currentBal - totalCost;
                        availBalanceEl.textContent = newBal.toLocaleString(undefined, {minimumFractionDigits:2});
                    }
                    
                    // Also dispatch an event or something, but we don't have to over-engineer.
                    // The dashboard will fetch the latest balance.
                    
                    alertBox.textContent = `Successfully bought ${qty} ${activeSymbol}!`;
                    alertBox.className = 'alert alert-success mt-4';
                    alertBox.style.display = 'block';
                    
                    setTimeout(() => closeBuyModal(), 2000);
                } catch(error) {
                    alertBox.textContent = error.message;
                    alertBox.className = 'alert alert-error mt-4';
                    alertBox.style.display = 'block';
                } finally {
                    executeBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
